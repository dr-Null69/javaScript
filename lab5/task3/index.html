<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Time Tools JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <section class="widget">
            <h2>Поточний час</h2>
            <div id="clock" class="clock-display">00<span class="dots">:</span>00<span class="dots">:</span>00</div>
        </section>

        <section class="widget">
            <h2>Таймер до події</h2>
            <input type="datetime-local" id="target-date">
            <div id="countdown-display" class="timer-values">Оберіть дату...</div>
        </section>

        <section class="widget">
            <h2>Календар та День Народження</h2>
            <div class="calendar-controls">
                <input type="month" id="month-select">
                <button id="birthday-btn">Скільки до ДН?</button>
            </div>
            <div id="calendar-container"></div>
            <div id="birthday-result"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
