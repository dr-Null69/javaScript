<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЄЄ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="traffic-light-flat">
            <div id="red" class="lamp-flat"></div>
            <div id="yellow" class="lamp-flat"></div>
            <div id="green" class="lamp-flat"></div>
        </div>

        <div class="info-board">
            <p id="status-text">Очікування...</p>
            <p id="timer-text">--</p>
        </div>

        <div class="button-pane">
            <button id="next-btn" class="simple-btn">Наступний</button>
            <button id="settings-btn" class="simple-btn settings">Налаштування</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
