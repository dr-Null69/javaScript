<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>task3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Kanban Board</h1>

<div class="board">

  <div class="column" data-status="todo">
    <h2>To Do</h2>
    <div class="task" draggable="true">1</div>
    <div class="task" draggable="true">2</div>

  </div>

  <div class="column" data-status="progress">
    <h2>In Progress</h2>
    <div class="task" draggable="true">3</div>
  </div>

  <div class="column" data-status="done">
    <h2>Done</h2>
    <div class="task" draggable="true">4</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
